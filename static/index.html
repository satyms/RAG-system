<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Engine</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- ─── Sidebar ────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="logo-text">RAG Engine</span>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <div class="sidebar-section">
      <h3>Upload Documents</h3>
      <label class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept=".pdf,.txt,.md" hidden />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Drop file or click to upload</span>
        <span class="upload-hint">PDF, TXT, MD</span>
      </label>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <div class="sidebar-section sidebar-footer">
      <span class="version-tag">v1.0.0</span>
    </div>
  </aside>

  <!-- ─── Mobile sidebar toggle ──────────────────────────── -->
  <button class="sidebar-toggle" id="sidebarToggle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
      <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- ─── Main chat area ─────────────────────────────────── -->
  <main class="chat-main">
    <!-- Messages container -->
    <div class="messages" id="messages">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h1>How can I help you today?</h1>
        <p>Upload a document and ask questions about it, or just start chatting.</p>
        <div class="suggestions">
          <button class="suggestion" data-q="Summarize the uploaded document">Summarize the document</button>
          <button class="suggestion" data-q="What are the key points?">Key points</button>
          <button class="suggestion" data-q="Explain in simple terms">Simplify the content</button>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-wrapper">
      <form class="input-area" id="chatForm">
        <textarea
          id="userInput"
          placeholder="Message RAG Engine…"
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </form>
      <p class="disclaimer">RAG Engine may produce inaccurate information. Verify important facts.</p>
    </div>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
