<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG System</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ══════════════  HERO / LANDING VIEW  ══════════════ -->
  <div class="hero-view" id="heroView">

    <!-- Glow orb -->
    <div class="orb-wrap" aria-hidden="true">
      <div class="orb"></div>
    </div>

    <!-- Top brand -->
    <header class="hero-header">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="22" height="22">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>RAG System</span>
      </div>
    </header>

    <!-- Centre block -->
    <div class="hero-center">
      <h1 class="hero-title">RAG System</h1>
      <p class="hero-sub">Upload documents, ask questions — get grounded answers.</p>

      <!-- Input card -->
      <div class="input-card" id="heroInputCard">
        <textarea id="heroInput" class="card-textarea" placeholder="Type your request…" rows="1" autocomplete="off"></textarea>
        <div class="card-footer">
          <!-- Attach -->
          <label class="icon-btn" title="Attach document">
            <input type="file" id="fileInput" accept=".pdf,.txt,.md,.docx" hidden />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </label>
          <!-- Send -->
          <button class="send-btn" id="heroSendBtn" title="Send" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
              <path d="M12 19V5m0 0L5 12m7-7l7 7"/>
            </svg>
          </button>
        </div>
        <!-- Upload status -->
        <div class="upload-pill" id="uploadPill" hidden></div>
      </div>

      <!-- Action chips -->
      <div class="chip-row">
        <button class="chip" data-q="Summarize the uploaded document">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Summarize Doc
        </button>
        <button class="chip" data-q="What are the key points of this document?">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Key Points
        </button>
        <button class="chip" data-q="Explain this document in simple terms">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Explain Simply
        </button>
        <button class="chip" data-q="Compare the main sections of this document">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Compare Sections
        </button>
        <button class="chip" id="uploadChip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Docs
        </button>
        <button class="chip" id="healthChip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          System Status
        </button>
        <button class="chip" data-q="List all document sources available">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          Show Sources
        </button>
        <button class="chip" id="clearChip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          Clear Chat
        </button>
      </div>
    </div>

    <!-- Footer -->
    <footer class="hero-footer">© 2026 RAG System</footer>
  </div>

  <!-- ══════════════  CHAT VIEW  ══════════════ -->
  <div class="chat-view" id="chatView" hidden>

    <!-- Nav bar -->
    <nav class="chat-nav">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span>RAG System</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn" id="newChatBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Chat
        </button>
        <label class="nav-btn">
          <input type="file" id="fileInputNav" accept=".pdf,.txt,.md,.docx" hidden />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload
        </label>
      </div>
    </nav>

    <!-- Messages -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Chat input -->
    <div class="chat-input-area">
      <div class="input-card chat-card">
        <textarea id="chatInput" class="card-textarea" placeholder="Ask a follow-up…" rows="1" autocomplete="off"></textarea>
        <div class="card-footer">
          <label class="icon-btn" title="Attach document">
            <input type="file" id="fileInputBar" accept=".pdf,.txt,.md,.docx" hidden />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </label>
          <button class="send-btn" id="chatSendBtn" title="Send" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor" width="17" height="17">
              <path d="M12 19V5m0 0L5 12m7-7l7 7"/>
            </svg>
          </button>
        </div>
      </div>
      <p class="disclaimer">RAG System may produce inaccurate information. Verify important facts.</p>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
